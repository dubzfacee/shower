<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Shower - Nataly Samantha</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Cormorant+Garamond:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="stork-container">
    <img src="img/ciguena.png" class="stork">
</div>

<div class="card">

  <h2 class="top-title">¡¡La cigüeña está en camino..!!</h2>

  <p class="invitation-text">
    Acompáñanos a llenar de amor a nuestra pequeña
  </p>

  <div class="name-wrapper">
      <img src="Oso1png.png"  class="oso">
      <div class="name">Nataly Samantha</div>
     <img src="oso2png.png" class="oso">
      <img src="ciguena.png">
  </div>

  <p class="invitation-message">
    Con una inmensa alegría, te invitamos a su baby shower ¡Te esperamos!
  </p>

  <div class="event-date">
    <div>DOMINGO</div>
    <div>
      <div class="event-number">22</div>
      <div>MARZO</div>
    </div>
    <div>3:30 PM</div>
  </div>

  <!-- UBICACIÓN + MÚSICA -->
  <div class="location-music-row">
    <button class="location-btn"
      onclick="window.open('https://www.google.com/maps/search/?api=1&query=Camino+Piedra+del+Coyote+s/n,+Santa+Ana+Zegache,+Oaxaca', '_blank')">
      📍 Ubicación
    </button>

    <button id="music-btn" class="music-btn">
      🎵 Música
    </button>
  </div>

  <!-- CONTADOR -->
  <div id="countdown" class="flip-clock"></div>

  <!-- FORMULARIO -->
  <div class="form">
    <input type="text" id="nombre" placeholder="Tu nombre">
    <input type="number" id="personas" placeholder="Número de personas">
    <textarea id="mensaje" placeholder="Mensaje opcional"></textarea>
    <button onclick="confirmar()">Confirmar asistencia</button>
  </div>

</div>

<div class="success-message" id="successMessage">
  ✨ Asistencia confirmada ✨
</div>

<!-- AUDIO -->
<audio id="bg-music" loop>
  <source src="musica/musica.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>

</html>
